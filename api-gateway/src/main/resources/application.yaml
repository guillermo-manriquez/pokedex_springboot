server:
  port: 8080

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: lb://AUTH-SERVICE
          predicates:
            - Path=/api/v1/auth/**

        - id: carrito-service
          uri: lb://CARRITO-SERVICE
          predicates:
            - Path=/api/v1/carritos/**

        - id: pokemon-service
          uri: lb://POKEMON-SERVICE
          predicates:
            - Path=/pokemon/**

        - id: pago-service
          uri: lb://PAGO-SERVICE
          predicates:
            - Path=/pagos/**

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/