server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      server:
        webmvc:
          routes:
            - id: auth-service
              uri: lb://AUTH-SERVICE
              predicates:
                - Path=/api/v1/auth/**

            - id: carrito-service
              uri: lb://CARRITO-SERVICE
              predicates:
                - Path=/api/v1/carritos/**

            - id: coleccion-service
              uri: lb://COLECCION-SERVICE
              predicates:
                - Path=/api/v1/listas/**

            - id: notificacion-service
              uri: lb://NOTIFICACION-SERVICE
              predicates:
                - Path=/api/v1/notificaciones/**

            - id: orden-service
              uri: lb://ORDEN-SERVICE
              predicates:
                - Path=/api/v1/ordenes/**

            - id: pago-service
              uri: lb://PAGO-SERVICE
              predicates:
                - Path=/api/v1/pago/**

            - id: pokemon-service
              uri: lb://POKEMON-SERVICE
              predicates:
                - Path=/api/v1/pokemon/**

            - id: producto-service
              uri: lb://PRODUCTO-SERVICE
              predicates:
                - Path=/api/v1/productos/**

            - id: social-service
              uri: lb://FAVORITE-SERVICE
              predicates:
                - Path=/api/v1/favorites/**

            - id: user-service
              uri: lb://USER-SERVICE
              predicates:
                - Path=/api/v1/users/**



eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

logging:
  level:
    org.springframework.cloud.gateway: TRACE
    org.springframework.web: DEBUG